/* ===== TOAST BLINDADO DHARANI ===== */

#toast {
  position: fixed !important;

  box-sizing: border-box;
will-change: opacity, transform;

  transform: translateX(-50%) scale(0.9);

  top: 45%;
  left: 50%;

  background: #186d47;
  color: white;

  box-shadow: 
  0 6px 18px rgba(0,0,0,0.18),
  0 0 12px rgba(24,120,51,0.4);

  
  padding: 10px 22px;
  border-radius: 20px;

  font-size: 15px;
  font-weight: 600;

  /* 🔒 ANTI ESTIRADO */
  display: inline-flex !important;
  align-items: center;
  justify-content: center;

  width: auto !important;
  height: auto !important;
  min-width: unset !important;
  min-height: unset !important;
  max-width: fit-content !important;
  max-height: fit-content !important;

  white-space: nowrap;

  box-shadow: 0 6px 18px rgba(0,0,0,0.18);

  opacity: 0;
  pointer-events: none;

  transition: opacity 0.25s ease, top 0.25s ease;

  z-index: 99999;
}

/* Visible */

#toast.mostrar {
  opacity: 1;
  top: 50%;
  transform: translateX(-50%) scale(1);

}

 /* ===== BUSCADOR ===== */

.buscador {
  max-width: 600px;
  margin: 15px auto 10px;
  padding: 8px 14px;

  background: white;
  border-radius: 25px;

  display: flex;

}

/* ===== BARRA CARRITO ESTILO BOTÓN ===== */

.barra-carrito {
  position: fixed;

  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);

  width: calc(100% - 40px);
  max-width: 420px;

  background: #5a8f7b;

  padding: 14px 18px;

  box-shadow: 0 6px 18px rgba(0,0,0,0.22);

  z-index: 9999;

  display: flex;
  justify-content: space-between;
  align-items: center;

  cursor: pointer;

  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.barra-carrito:hover {
  transform: translateX(-50%) scale(1.02);
  box-shadow: 0 8px 22px rgba(0,0,0,0.28);
}



/* ===== PANEL CARRITO ===== */

function mostrarCarrito() {

}

function normalizarTexto(texto) {
  return texto
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "");
}

function buscarProductos(texto) {

  const textoNormalizado = normalizar(texto);

  const contenedor = document.getElementById("resultados-busqueda");
  const lista = document.getElementById("lista-resultados");

  lista.innerHTML = "";

  if (textoNormalizado === "") {

    contenedor.classList.remove("visible");

    return;
  }

  let encontrados = 0;

  document.querySelectorAll(".producto").forEach(prod => {

    const header = prod.querySelector(".producto-header");

    if (!header) return;

    const nombreProducto = normalizar(header.innerText);

    if (nombreProducto.includes(textoNormalizado)) {

      const clon = prod.cloneNode(true);
      lista.appendChild(clon);
      encontrados++;

    }

  });

  if (encontrados > 0) {

    document.querySelectorAll(".categoria").forEach(cat => {
      cat.classList.remove("visible");
    });

    contenedor.classList.add("visible");

  } else {

    contenedor.classList.add("visible");
    lista.innerHTML = "<p>No se encontraron productos</p>";

  }
}

function restarProducto(i) {

  if (carrito[i].cantidad > 1) {
    carrito[i].cantidad--;
  } else {
    carrito.splice(i, 1);
  }

  mostrarCarrito();
  guardarCarrito();
}

function eliminarProducto(i) {
  carrito.splice(i, 1);
  mostrarCarrito();
  guardarCarrito();
}

    slideIndex = 0;
  }
}

function abrirProducto(id) {

  const contenedor = document.getElementById("detalle-contenido");

  contenedor.innerHTML = `
    <button class="btn-volver" onclick="mostrar('${producto.categoria}')">
      ← Volver
    </button>

    <div class="detalle-producto">

      <div class="detalle-imagen">

      </div>

      <div class="detalle-info">

        <h2>${producto.nombre}</h2>
        <p>${producto.descripcion}</p>

        <div class="pesos">
          ${producto.opciones.map((op, i) => `
            <button class="peso-btn ${i === 0 ? 'active' : ''}" data-precio="${op.precio}">
              ${op.peso}
            </button>
          `).join("")}
        </div>

        <div class="precio">
          $<span class="precio-valor">${producto.opciones[0].precio}</span>
        </div>

        <div class="footer-compra">
          <div class="cantidad-control">
            <button class="cantidad-btn menos">−</button>
            <span class="cantidad-valor">1</span>
            <button class="cantidad-btn mas">+</button>
          </div>

          <button class="btn-agregar-icono">
            🛒
          </button>
        </div>

      </div>
    </div>
  `;

  mostrar("producto-detalle");
}

		
function renderProductos() {

  const contenedores = {};

  productos.forEach(producto => {

    const categoriaId = "contenedor-" + producto.categoria;
    const contenedorCategoria = document.getElementById(categoriaId);

    if (!contenedorCategoria) return;

    const claveSub = producto.categoria + "-" + producto.subcategoria;

    if (!contenedores[claveSub]) {

      const bloqueSub = document.createElement("div");
      bloqueSub.innerHTML = `
        <h3 class="subcategoria">${producto.subcategoria}</h3>
        <div class="bloque-subcategoria"></div>
      `;

      contenedorCategoria.appendChild(bloqueSub);
      contenedores[claveSub] = bloqueSub.querySelector(".bloque-subcategoria");
    }

    const tarjeta = document.createElement("div");
    tarjeta.classList.add("tarjeta-producto");

    tarjeta.innerHTML = `
      <h3 class="nombre-producto">${producto.nombre}</h3>

      <div class="producto-imagen-container">
        <img src="${producto.imagen}" class="producto-imagen">
      </div>

      <p class="descripcion">${producto.descripcion}</p>

      <div class="pesos">
        ${producto.opciones.map((op, i) => `
          <button class="peso-btn ${i === 0 ? 'active' : ''}" data-precio="${op.precio}">
            ${op.peso}
          </button>
        `).join("")}
      </div>

      <div class="precio">
        $<span class="precio-valor">${producto.opciones[0].precio}</span>
      </div>

      <div class="footer-compra">
        <div class="cantidad-control">
          <button class="cantidad-btn menos">−</button>
          <span class="cantidad-valor">1</span>
          <button class="cantidad-btn mas">+</button>
        </div>

        <button class="btn-agregar-icono">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
            <circle cx="9" cy="21" r="1"></circle>
            <circle cx="20" cy="21" r="1"></circle>
            <path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h7.8a2 2 0 0 0 2-1.6L23 6H6"></path>
          </svg>
        </button>
      </div>
    `;

    contenedores[claveSub].appendChild(tarjeta);

	  tarjeta.querySelector(".nombre-producto")
  .addEventListener("click", () => abrirProducto(producto.id));

tarjeta.querySelector(".producto-imagen")
  .addEventListener("click", () => abrirProducto(producto.id));


    // ===== INTERACCIONES =====

    let precioActual = producto.opciones[0].precio;
    let cantidad = 1;

    const precioSpan = tarjeta.querySelector(".precio-valor");
    const botonesPeso = tarjeta.querySelectorAll(".peso-btn");
    const btnMas = tarjeta.querySelector(".mas");
    const btnMenos = tarjeta.querySelector(".menos");
    const cantidadValor = tarjeta.querySelector(".cantidad-valor");
    const btnAgregar = tarjeta.querySelector(".btn-agregar-icono");

    botonesPeso.forEach(btn => {
      btn.addEventListener("click", () => {

        botonesPeso.forEach(b => b.classList.remove("active"));
        btn.classList.add("active");

        precioActual = Number(btn.dataset.precio);
        precioSpan.textContent = precioActual;
      });
    });

    btnMas.addEventListener("click", () => {
      cantidad++;
      cantidadValor.textContent = cantidad;
    });

    btnMenos.addEventListener("click", () => {
      if (cantidad > 1) {
        cantidad--;
        cantidadValor.textContent = cantidad;
      }
    });

    btnAgregar.addEventListener("click", () => {

      const existente = carrito.find(p =>
        p.id === producto.id + "-" + precioActual
      );

      if (existente) {
        existente.cantidad += cantidad;
      } else {
        carrito.push({
          id: producto.id + "-" + precioActual,
          nombre: producto.nombre + " (" +
            producto.opciones.find(o => o.precio == precioActual).peso +
            ")",
          precio: precioActual,
          cantidad: cantidad
        });
      }

      mostrarCarrito();
      guardarCarrito();
      mostrarToast("🛒 Producto agregado 💚");
    });

  });
}
